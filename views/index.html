<!DOCTYPE html>
<html>
  <head>
    <title>URL Shortener Microservice | freeCodeCamp.org</title>
    <link
      rel="icon"
      type="image/png"
      href="https://cdn.freecodecamp.org/universal/favicons/favicon-16x16.png"
    />
    <link href="/public/style.css" rel="stylesheet" type="text/css" />
  </head>

  <body>
    <h1>URL Shortener Microservice</h1>
    <hr />

    <!-- Short URL Creation Info -->
    <section>
      <h2>Short URL Creation</h2>
      <p>Example: POST [project_url]/api/shorturl - https://www.google.com</p>
    </section>

    <!-- FORM -->
    <section>
      <form action="/api/shorturl" method="POST">
        <fieldset>
          <legend>URL Shortener</legend>
          <label for="url_input">URL:</label>
          <input
            id="url_input"
            type="text"
            name="url"
            placeholder="https://www.freecodecamp.org/"
            required
          />
          <input type="submit" value="POST URL" />
        </fieldset>
      </form>
    </section>

    <hr />

    <!-- Example Usage -->
    <section>
      <h2>Example Usage:</h2>
      <p>[this_project_url]/api/shorturl/3</p>

      <h2>Will Redirect to:</h2>
      <p>https://forum.freecodecamp.org/</p>
    </section>

    <footer>
      <p>
        By <a href="https://www.freecodecamp.org/">freeCodeCamp</a>
      </p>
    </footer>
  </body>
</html>
